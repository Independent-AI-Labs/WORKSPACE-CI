# workspace-ci Wiki production stack (Podman Compose).
#
# Host ports: HTTP 8080 -> nginx 80, HTTPS 8443 -> nginx 443 (unprivileged; no root).
# Override for privileged ports: WIKI_HTTP_PORT=80 WIKI_HTTPS_PORT=443

services:
  wiki-app:
    image: localhost/workspace-ci-wiki:prod
    pull_policy: never
    container_name: wiki-ci-app
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://localhost,https://127.0.0.1}
      # Unset = auto-derive https://<request-host>/grafana per request (same-origin iframes).
      GRAFANA_BASE_URL: ${GRAFANA_BASE_URL:-}
      WIKI_HOME_LANDING_ENABLED: ${WIKI_HOME_LANDING_ENABLED:-false}
    expose:
      - "3000"
    volumes:
      - wiki-feedback:/workspace/CI/web/data/feedback
    networks:
      - wiki
    restart: unless-stopped

  wiki-nginx:
    image: docker.io/library/nginx:1.27.4-bookworm
    container_name: wiki-ci-nginx
    depends_on:
      - wiki-app
    networks:
      - wiki
      - gateway
    ports:
      - "${WIKI_HTTP_PORT:-8080}:80"
      - "${WIKI_HTTPS_PORT:-8443}:443"
    environment:
      WIKI_TLS_CN: ${WIKI_TLS_CN:-localhost}
      WIKI_TLS_DIR: /etc/nginx/certs
      WIKI_TLS_MODE: ${WIKI_TLS_MODE:-auto}
    volumes:
      - ./res/nginx/wiki-prod.conf:/scripts/wiki-prod.conf.template:ro
      - ./scripts/gen-self-signed-cert.sh:/scripts/gen-self-signed-cert.sh:ro
      - ./res/nginx/entrypoint.sh:/entrypoint.sh:ro
      - ${WIKI_TLS_DIR:?Set WIKI_TLS_DIR to the host cert directory}:/etc/nginx/certs
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    restart: unless-stopped

volumes:
  wiki-feedback:

networks:
  wiki:
  gateway:
    external: true
    name: docker_gateway