name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  UV_VERSION: '0.11.23'
  GITLEAKS_VERSION: '8.21.2'

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Job 1: Security & guard checks (parallel with quality-gate)
  # ─────────────────────────────────────────────────────────────────────
  security-guards:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap uv (SHA256-verified)
        run: bash scripts/bootstrap-uv

      - name: Bootstrap gitleaks (SHA256-verified)
        run: bash scripts/bootstrap-gitleaks

      - name: Add .boot-linux/bin to PATH
        run: echo "$(pwd)/.boot-linux/bin" >> $GITHUB_PATH

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}

      - name: Sync Python deps
        run: uv sync --extra dev

      # ── Security checks ────────────────────────────────────────────
      - name: Block sensitive files
        run: bash -c 'source lib/checks.sh && ci_block_sensitive_files'

      - name: Secret scan (gitleaks)
        run: bash -c 'source lib/checks.sh && ci_scan_secrets'

      - name: Banned words check
        run: bash -c 'source lib/checks.sh && ci_check_banned_words'

      - name: Silent-swallow check
        run: bash -c 'source lib/checks.sh && ci_check_silent_swallow'

      - name: Portable shell check
        run: bash -c 'source lib/checks.sh && ci_check_portable_shell'

      - name: File length check
        run: bash -c 'source lib/checks.sh && ci_check_file_length'

      - name: Init files check
        run: bash -c 'source lib/checks.sh && ci_check_init_files'

      - name: Py not executable check
        run: bash -c 'source lib/checks.sh && ci_check_py_not_executable'

      - name: No dead imports check
        run: bash -c 'source lib/checks.sh && ci_check_no_dead_imports'

      # ── Dependency & config checks ─────────────────────────────────
      - name: Dependency version check
        run: .venv/bin/python -m ci.check_dependency_versions pyproject.toml web/package.json

      - name: Duplicate dependencies check
        run: .venv/bin/python -m ci.check_duplicate_dependencies

      - name: Coverage no-devolution
        run: bash -c 'source lib/checks.sh && ci_check_coverage_thresholds_no_devolution'

      - name: Required hooks present
        run: .venv/bin/python -m ci.check_required_hooks_present --quiet

      - name: Markdown docs check
        run: .venv/bin/python -m ci.check_markdown_docs --all-md --check-remote

      - name: Boot venv layout (non-blocking)
        run: .venv/bin/python -m ci.check_boot_venv_layout
        continue-on-error: true

      - name: Dead code analysis (non-blocking)
        run: .venv/bin/python -m ci.check_dead_code
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────────
  # Job 2: Quality gate (lint + type + tests + coverage + web)
  # ─────────────────────────────────────────────────────────────────────
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap uv (SHA256-verified)
        run: bash scripts/bootstrap-uv

      - name: Add .boot-linux/bin to PATH
        run: echo "$(pwd)/.boot-linux/bin" >> $GITHUB_PATH

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}

      - name: Sync Python deps
        run: uv sync --extra dev

      - uses: actions/setup-node@v4
        with:
          node-version-file: 'web/.nvmrc'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install web deps
        run: npm install
        working-directory: web

      - name: Configure git identity for integration tests
        run: |
          git config --global user.email "ci@no-reply.example"
          git config --global user.name "CI Runner"

      - name: Quality gate (lint + type + tests + coverage + web)
        run: make check-push
