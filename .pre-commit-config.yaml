# workspace-ci Pre-commit Configuration
# This file serves as both the CI project's own hooks AND a reference template.
#
# Path patterns for sourcing checks.sh from different project depths:
#   Root workspace:          projects/CI/lib/checks.sh
#   projects/<project>/:     ../CI/lib/checks.sh
#   projects/<group>/<sub>/: ../../CI/lib/checks.sh
#
# For CI itself (self-referencing):
#   lib/checks.sh
repos:
  - repo: local
    hooks:
      - id: check-unstaged
        name: Block Unstaged Changes
        entry: "bash -c 'source lib/checks.sh && ci_check_unstaged'"
        language: system
        pass_filenames: false
        always_run: true

      - id: ci-lint
        name: Lint (make lint)
        entry: make lint
        language: system
        pass_filenames: false
        always_run: true

      - id: block-sensitive-files
        name: Block Sensitive Files
        entry: "bash -c 'source lib/checks.sh && ci_block_sensitive_files'"
        language: system
        pass_filenames: false
        always_run: true

      - id: gitleaks
        name: Block secrets in all files (gitleaks)
        entry: "bash -c 'source lib/checks.sh && ci_scan_secrets'"
        language: system
        pass_filenames: false
        always_run: true

      - id: ci-check-error-swallow
        name: Block error-swallow patterns
        entry: "bash -c 'source lib/checks.sh && ci_check_silent_swallow'"
        language: system
        pass_filenames: false
        always_run: true

      - id: check-dependency-versions
        name: Check Dependency Versions (strict pinning + latest)
        entry: "bash -c 'source lib/ci.sh && exec uv run python -m ci.check_dependency_versions \"$@\"' --"
        language: system
        pass_filenames: false
        always_run: true

      - id: check-duplicate-dependencies
        name: Check Duplicate/Redundant Dependencies
        entry: "bash -c 'source lib/ci.sh && exec uv run python -m ci.check_duplicate_dependencies \"$@\"' --"
        language: system
        pass_filenames: false
        always_run: true

      - id: check-banned-words
        name: Check Banned Words
        entry: "bash -c 'source lib/checks.sh && ci_check_banned_words'"
        language: system
        pass_filenames: false
        always_run: true

      - id: check-coverage-no-devolution
        name: Block Coverage Threshold De-Evolution
        entry: "bash -c 'source lib/checks.sh && ci_check_coverage_thresholds_no_devolution'"
        language: system
        pass_filenames: false
        always_run: true

      - id: check-file-length
        name: Check File Length (max 512 lines)
        entry: "bash -c 'source lib/checks.sh && ci_check_file_length'"
        language: system
        pass_filenames: false
        always_run: true

      - id: check-init-files
        name: Enforce Empty __init__.py Files
        entry: "bash -c 'source lib/checks.sh && ci_check_init_files'"
        language: system
        pass_filenames: false
        always_run: true

      - id: check-py-not-executable
        name: Forbid +x bit on .py modules
        entry: "bash -c 'source lib/checks.sh && ci_check_py_not_executable'"
        language: system
        pass_filenames: false
        always_run: true

      - id: check-portable-shell
        name: Block Process Substitution (not portable across virtualization)
        entry: "bash -c 'source lib/checks.sh && ci_check_portable_shell'"
        language: system
        pass_filenames: false
        always_run: true

      - id: check-no-dead-imports
        name: Forbid deleting .py modules that are still imported
        entry: "bash -c 'source lib/checks.sh && ci_check_no_dead_imports'"
        language: system
        pass_filenames: false
        always_run: true

      - id: ci-type-check
        name: Type-check (make type-check)
        entry: make type-check
        language: system
        pass_filenames: false
        always_run: true

      - id: check-markdown-docs
        name: Check Markdown Documentation References
        entry: "bash -c 'source lib/ci.sh && exec uv run python -m ci.check_markdown_docs --all-md --check-remote'"
        language: system
        pass_filenames: false
        always_run: true

      - id: check-required-hooks-present
        name: CI Self-Check (manifest + exceptions + rendered hooks)
        entry: "bash -c 'source lib/ci.sh && exec uv run python -m ci.check_required_hooks_present --quiet'"
        language: system
        pass_filenames: false
        always_run: true

      - id: check-boot-venv-layout
        name: Boot Layout Audit (non-blocking)
        entry: "bash -c 'source lib/ci.sh && exec uv run python -m ci.check_boot_venv_layout'"
        language: system
        pass_filenames: false
        always_run: true

      - id: check-commit-message
        name: Check Commit Message Format
        entry: "bash -c 'source lib/checks.sh && ci_check_commit_message \"$1\"' --"
        language: system
        stages: [commit-msg]

      - id: block-coauthored
        name: Block Co-authored Commits
        entry: "bash -c 'source lib/checks.sh && ci_block_coauthored \"$1\"' --"
        language: system
        stages: [commit-msg]

  - repo: local
    hooks:
      - id: ci-check-push
        name: Pre-push Quality Gate (lint + type + tests + coverage)
        entry: "make check-push"
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true

      - id: block-coauthored-history
        name: Block Commits with Blocked Patterns (full history scan)
        entry: "bash -c 'source lib/checks.sh && ci_block_coauthored_history'"
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true

      - id: check-dead-code
        name: Dead Code Analysis (non-blocking)
        entry: "bash -c 'source lib/checks.sh && ci_check_dead_code'"
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true
