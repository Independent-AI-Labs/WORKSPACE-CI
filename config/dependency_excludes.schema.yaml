# Schema for dependency_excludes.yaml: field-level documentation.
#
# Convention: one config/<name>.schema.yaml per config/<name>.yaml.
# Consumed by the wiki's ConfigFieldTable component (SPEC-WIKI.md §10.7)
# to render field/type/default/description for the configuration reference
# pages (FR-7.3). This file is the canonical source for field descriptions;
# the wiki derives documentation from it, never hand-maintaining prose.
config: dependency_excludes
description: "Dependencies excluded from version-mismatch checks; used by check_dependency_versions to skip packages that are intentionally unversioned or externally managed."
fields:
  - path: excludes
    type: list<string>
    required: true
    description: "Package names excluded from dependency version checks. Entries here are not flagged when their version constraints are missing or inconsistent."
