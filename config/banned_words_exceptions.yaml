# workspace-ci banned words exceptions.
# Only the config file that defines patterns and test/lib files.
exceptions:
  # Config YAML files define banned patterns and must contain them.
  # AGENTS.md is the policy file that documents all banned patterns.
  - pattern: '.*'
    paths:
      - 'config/.*\.yaml$'
      - '\.pre-commit-config\.yaml$'
      - 'AGENTS\.md$'

  # ── Documentation references (docs/) ─────────────────────────────────
  # Docs reference banned patterns by name in specs, requirements, and
  # category labels. These are descriptions, not instructions.
  - pattern: ' -- '
    paths: ['docs/']
  - pattern: '#\s*type:\s*ignore'
    paths: ['docs/']
  - pattern: '\bpython3?\b'
    paths: ['docs/']
  - pattern: '\bfallback\b'
    paths: ['docs/', 'README\.md$']
  - pattern: '\blegacy\b'
    paths: ['docs/']
  - pattern: '\bmock\b'
    paths: ['docs/']
  - pattern: '\bsilent'
    paths: ['docs/', 'README\.md$']
  - pattern: '\bskeleton\b'
    paths: ['docs/']
  - pattern: '\blazy\b'
    paths: ['docs/']
  - pattern: '\bbackwards\b'
    paths: ['docs/']
  - pattern: '\bcompatibility\b'
    paths: ['docs/']
  - pattern: '\bdegradation\b'
    paths: ['docs/']
  - pattern: '\bdict\[.*,\s*Any\]'
    paths: ['docs/']
  - pattern: '\|\s*object\b'
    paths: ['docs/']
  - pattern: 'eslint-disable'
    paths: ['docs/']
  - pattern: '@dataclass'
    paths: ['docs/', 'README\.md$']
  - pattern: 'self\.get\('
    paths: ['docs/', 'README\.md$']


  # ── Shell lib / tests / scripts (pre-existing) ───────────────────────
  # Shell lib files use these words in check function names and messages.
  - pattern: '\bsilent'
    paths: ['lib/', 'tests/', 'scripts/', 'ci/check_markdown_docs\.py$', 'ci/_md_http_client\.py$']
  - pattern: '\.suppress'
    paths: ['lib/', 'tests/']

  # The check-tester itself authors heredocs containing the banned
  # "not implemented yet" string as fixture payload; exempt the single
  # file that exercises the directory_rules check.
  - pattern: 'not implemented yet'
    paths: ['tests/unit/test_checks.sh']

  # Tests need these words for test descriptions and mocking
  - pattern: '\bmock\b'
    paths: ['tests/']
  - pattern: '\blegacy\b'
    paths: ['tests/', 'scripts/', 'templates/']
  # Extensionless shell scripts in scripts/ reference python-ta-reference and
  # other python-derived directory names in skip-dirs string lists. Mirrors
  # the universal lib/ + tests/ exemption at banned_words.yaml:76-78.
  - pattern: '\bpython3?\b'
    paths: ['scripts/']
  - pattern: '\bstubs?\b'
    paths: ['tests/']
  - pattern: '\bfallback\b'
    paths: ['tests/', 'lib/']
  # check_silent_swallow.py emits the spec'd `<file>:<line>: <pattern> -- <line>`
  # output format and documents diff/regex syntax containing ` -- `.
  # scripts/ use ` -- ` as section separators in comments (e.g. `# -- Summary --`).
  - pattern: ' -- '
    paths:
      - 'lib/check_silent_swallow\.py$'
      - 'lib/checks_silent\.sh$'
      - 'tests/integration/test_silent_swallow\.sh$'
      - 'scripts/'
  - pattern: '\bbackwards\b'
    paths: ['tests/']
  - pattern: '\bcompatibility\b'
    paths: ['tests/']
  - pattern: ':\s*Any\b'
    paths: ['tests/']
  - pattern: '\bxfail\b'
    paths: ['config/banned_words.yaml', 'tests/']

  # Audit documents reference all banned patterns by name.
  - pattern: '.*'
    paths: ['docs/AUDIT-.*\.md$', 'docs/audits/.*\.md$']

  # ── Wiki web UI (web/) ───────────────────────────────────────────────
  # The wiki's pattern-detection module and its tests must contain the
  # exact banned-word strings to test detection logic. The word "python"
  # is used as a programming-language identifier in types, imports, and
  # UI labels: not as a CLI invocation.
  - pattern: '\bpython3?\b'
    paths:
      - 'web/src/types/patterns\.ts$'
      - 'web/src/components/wiki/CheckCard\.tsx$'
      - 'web/src/components/wiki/PatternCard\.tsx$'
      - 'web/src/components/wiki/playground/CodeEditor\.tsx$'
      - 'web/src/components/wiki/playground/LanguageSelector\.tsx$'
      - 'web/src/hooks/usePlayground\.ts$'
      - 'web/src/hooks/useHookFilter\.test\.ts$'
      - 'web/src/hooks/usePlayground\.test\.ts$'
      - 'web/app/checks/\[id\]/page\.tsx$'
      - 'web/app/patterns/\[category\]/page\.tsx$'
      - 'web/app/hooks/page\.tsx$'
      - 'web/app/patterns/page\.tsx$'
      - 'web/package\.json$'
      - 'web/package-lock\.json$'
  - pattern: '\blegacy\b'
    paths: ['web/package-lock\.json$']
  - pattern: 'eslint-disable'
    paths:
      - 'web/src/lib/patterns\.test\.ts$'
      - 'web/src/lib/search-index\.test\.ts$'
      - 'web/src/lib/regex-engine\.test\.ts$'
      - 'web/src/hooks/usePlayground\.test\.ts$'
  - pattern: '\blist\[object\]'
    paths: ['web/src/lib/patterns\.test\.ts$']
  - pattern: '\blegacy\b'
    paths:
      - 'web/src/lib/patterns\.test\.ts$'
      - 'web/src/lib/patterns\.ts$'
  - pattern: '@dataclass'
    paths: ['web/src/lib/patterns\.test\.ts$']
  - pattern: '\bxfail\b'
    paths:
      - 'web/src/lib/patterns\.test\.ts$'
      - 'web/src/lib/patterns\.ts$'
  - pattern: '/home/'
    paths: ['web/src/lib/patterns\.test\.ts$']
  - pattern: ':latest\b'
    paths: ['web/src/lib/patterns\.test\.ts$']
  - pattern: ' -- '
    paths: ['web/src/lib/patterns\.test\.ts$']
  - pattern: '\bgetattr\('
    paths: ['web/src/lib/regex-engine\.test\.ts$']
  - pattern: '\bmock\b'
    paths:
      - 'web/src/components/wiki/WikiSidebar\.test\.tsx$'
      - 'web/src/components/wiki/WikiSearch\.test\.tsx$'
      - 'web/src/components/wiki/ComingSoon\.test\.tsx$'
      - 'web/src/hooks/useSearch\.test\.ts$'
  - pattern: '\bbackwards\b'
    paths: ['web/src/lib/patterns\.ts$']
  - pattern: '\bskeleton\b'
    paths: ['web/src/lib/patterns\.ts$']
  - pattern: '\blazy\b'
    paths: ['web/src/lib/patterns\.ts$']
  - pattern: '\bmaybe\b'
    paths: ['web/src/lib/patterns\.ts$']
  - pattern: '\bimportlib\b'
    paths: ['web/src/lib/patterns\.ts$']
  # ErrorBoundary uses the standard React "fallback" prop name (same as
  # <Suspense> and react-error-boundary). Not "fallback code" -- it is
  # explicit error UI rendered when the boundary catches an error.
  - pattern: '\bfallback\b'
    paths:
      - 'web/src/components/ui/ErrorBoundary\.tsx$'
      - 'web/src/components/ui/ErrorBoundary\.test\.tsx$'
  # CollapsibleSection uses "hidden" to describe WAI-ARIA disclosure state.
  - pattern: '\bsilent'
    paths: ['web/src/components/ui/ErrorBoundary\.test\.tsx$']

  # swallow-detectors.json is generated data containing Python source code
  # extracts from lib/check_silent_swallow*.py (which are already exempted).
  - pattern: '\bsilent'
    paths: ['web/src/data/swallow-detectors\.json$']

  # hook-descriptions.json is generated data containing descriptions of the
  # silent-swallow checker itself.
  - pattern: '\bsilent'
    paths: ['web/src/data/hook-descriptions\.json$']

  # hook-sources.json is generated data containing raw source code of CI
  # hooks, including ci_check_silent_swallow and python module hooks.
  - pattern: '\bsilent'
    paths: ['web/src/data/hook-sources\.json$']
  - pattern: '\bpython3?\b'
    paths: ['web/src/data/hook-sources\.json$']
  - pattern: ' -- '
    paths: ['web/src/data/hook-sources\.json$']

  # script-sources.json is generated data containing raw source code of CI
  # scripts, including shebangs, language identifiers, and comment headers.
  - pattern: '\bpython3?\b'
    paths: ['web/src/data/script-sources\.json$']
  - pattern: '\blegacy\b'
    paths: ['web/src/data/script-sources\.json$']
  - pattern: ' -- '
    paths: ['web/src/data/script-sources\.json$']
