# workspace-ci banned words exceptions.
# Policy files (banned_words.yaml, banned_words_exceptions.yaml) are fully
# exempt via universal_exceptions in banned_words.yaml — not listed here.
exceptions:
  # ── Documentation references (docs/) ─────────────────────────────────
  - pattern: ' -- '
    paths: ['docs/']
  - pattern: '#\s*type:\s*ignore'
    paths: ['docs/']
  - pattern: '\bpython3?\b'
    paths: ['docs/']
  - pattern: '\.venv/bin/python'
    paths: ['docs/']
  - pattern: "pattern:\\s*'\\.\\*'"
    paths: ['docs/']
  - pattern: 'pattern:\s*"\.\*"'
    paths: ['docs/']
  - pattern: '\bfallback\b'
    paths: ['docs/']
  - pattern: '\blegacy\b'
    paths: ['docs/']
  - pattern: '\bmock\b'
    paths: ['docs/']
  - pattern: '\bsilent'
    paths: ['docs/']
  - pattern: '\bskeleton\b'
    paths: ['docs/']
  - pattern: '\blazy\b'
    paths: ['docs/']
  - pattern: '\bbackwards\b'
    paths: ['docs/']
  - pattern: '\bcompatibility\b'
    paths: ['docs/']
  - pattern: '\bdegradation\b'
    paths: ['docs/']
  - pattern: '\bdict\[.*,\s*Any\]'
    paths: ['docs/']
  - pattern: '\|\s*object\b'
    paths: ['docs/']
  - pattern: 'eslint-disable'
    paths: ['docs/']
  - pattern: '@dataclass'
    paths: ['docs/']
  - pattern: 'self\.get\('
    paths: ['docs/']

  - pattern: '\.suppress'
    paths: ['tests/']
  - pattern: '\bmock\b'
    paths: ['tests/']
  - pattern: ' -- '
    paths:
      - 'lib/check_silent_swallow\.py$'
      - 'lib/checks_silent\.sh$'
      - 'tests/integration/test_silent_swallow\.sh$'
      - 'scripts/'
  - pattern: ':\s*Any\b'
    paths: ['tests/']
  - pattern: '\bxfail\b'
    paths: ['tests/']

  - pattern: '\bsilent'
    paths: ['web/src/data/swallow-detectors\.json$']
  - pattern: '\bsilent'
    paths: ['web/src/data/hook-sources\.json$']
  - pattern: '\bpython3?\b'
    paths: ['web/src/data/hook-sources\.json$']
  - pattern: ' -- '
    paths: ['web/src/data/hook-sources\.json$']
  - pattern: '\bpython3?\b'
    paths: ['web/src/data/script-sources\.json$']
  - pattern: '\blegacy\b'
    paths: ['web/src/data/script-sources\.json$']
  - pattern: ' -- '
    paths: ['web/src/data/script-sources\.json$']

  - pattern: '\blegacy\b'
    paths: ['scripts/cleanup-precommit$']
  - pattern: '\bsilent'
    paths:
      - 'lib/ci_paths\.py$'
      - 'scripts/extract-swallow-source\.py$'

  - pattern: '\bpython3?\b'
    paths:
      - 'web/src/.*\.(ts|tsx)$'
      - 'web/app/.*\.(ts|tsx)$'
      - 'web/package\.json$'
  - pattern: '\blegacy\b'
    paths:
      - 'web/src/.*\.(ts|tsx)$'
      - 'web/package\.json$'
  - pattern: '\bfallback\b'
    paths: ['web/src/components/ui/ErrorBoundary\.tsx$']
  - pattern: '\bsilent'
    paths:
      - 'web/src/lib/card-adapters\.ts$'
      - 'web/src/lib/search-data\.ts$'
      - 'web/src/lib/yaml-loader\.ts$'