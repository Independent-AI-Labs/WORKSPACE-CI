# workspace-ci banned words exceptions.
# Only the config file that defines patterns and test/lib files.
exceptions:
  # Config YAML files define banned patterns and must contain them.
  - pattern: '.*'
    paths:
      - 'config/.*\.yaml$'
      - '\.pre-commit-config\.yaml$'

  # ── Documentation references (docs/) ─────────────────────────────────
  # Docs reference banned patterns by name in specs, requirements, and
  # category labels. These are descriptions, not instructions.
  - pattern: ' -- '
    paths: ['docs/']
  - pattern: '#\s*type:\s*ignore'
    paths: ['docs/']
  - pattern: '\bpython3?\b'
    paths: ['docs/']
  - pattern: '\bfallback\b'
    paths: ['docs/']
  - pattern: '\blegacy\b'
    paths: ['docs/']
  - pattern: '\bmock\b'
    paths: ['docs/']
  - pattern: '\bsilent'
    paths: ['docs/']
  - pattern: '\bskeleton\b'
    paths: ['docs/']
  - pattern: '\blazy\b'
    paths: ['docs/']
  - pattern: '\bbackwards\b'
    paths: ['docs/']
  - pattern: '\bcompatibility\b'
    paths: ['docs/']
  - pattern: '\bdegradation\b'
    paths: ['docs/']
  - pattern: '\bdict\[.*,\s*Any\]'
    paths: ['docs/']
  - pattern: '\|\s*object\b'
    paths: ['docs/']
  - pattern: 'eslint-disable'
    paths: ['docs/']


  # ── Shell lib / tests / scripts (pre-existing) ───────────────────────
  # Shell lib files use these words in check function names and messages.
  - pattern: '\bsilent'
    paths: ['lib/', 'tests/', 'scripts/', 'ci/check_markdown_docs\.py$', 'ci/_md_http_client\.py$']
  - pattern: '\.suppress'
    paths: ['lib/', 'tests/']

  # The check-tester itself authors heredocs containing the banned
  # "not implemented yet" string as fixture payload; exempt the single
  # file that exercises the directory_rules check.
  - pattern: 'not implemented yet'
    paths: ['tests/unit/test_checks.sh']

  # Tests need these words for test descriptions and mocking
  - pattern: '\bmock\b'
    paths: ['tests/']
  - pattern: '\blegacy\b'
    paths: ['tests/', 'scripts/', 'templates/']
  # Extensionless shell scripts in scripts/ reference python-ta-reference and
  # other python-derived directory names in skip-dirs string lists. Mirrors
  # the universal lib/ + tests/ exemption at banned_words.yaml:76-78.
  - pattern: '\bpython3?\b'
    paths: ['scripts/']
  - pattern: '\bstubs?\b'
    paths: ['tests/']
  - pattern: '\bfallback\b'
    paths: ['tests/', 'lib/']
  # check_silent_swallow.py emits the spec'd `<file>:<line>: <pattern> -- <line>`
  # output format and documents diff/regex syntax containing ` -- `.
  # scripts/ use ` -- ` as section separators in comments (e.g. `# -- Summary --`).
  - pattern: ' -- '
    paths:
      - 'lib/check_silent_swallow\.py$'
      - 'lib/checks_silent\.sh$'
      - 'tests/integration/test_silent_swallow\.sh$'
      - 'scripts/'
  - pattern: '\bbackwards\b'
    paths: ['tests/']
  - pattern: '\bcompatibility\b'
    paths: ['tests/']
  - pattern: ':\s*Any\b'
    paths: ['tests/']
  - pattern: '\bxfail\b'
    paths: ['config/banned_words.yaml', 'tests/']
