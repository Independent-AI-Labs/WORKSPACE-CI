---
# workspace-ci Wiki - Cloudflare Tunnel (no VM tunnel wrapper)
#
# Env overrides:
#   CLOUDFLARED_BIN  - path to cloudflared (default: <CI>/.boot-linux/bin/cloudflared)
#   TUNNEL_CONFIG    - path to config.yml (default: <CI>/cloudflare/config.yml)
#   WIKI_TUNNEL_HOSTNAME - public hostname (status/route-dns)
#   WIKI_TUNNEL_NAME     - tunnel name for route-dns (default: workspace-ci-wiki)
#   WIKI_TUNNEL_ORIGIN   - prod nginx origin (default: https://127.0.0.1:443)
#   WIKI_HTTPS_PORT      - host HTTPS port for prod stack (default: 443)
#   TUNNEL_TOKEN         - optional; run via --token (skips credentials.json requirement)
#   CLOUDFLARE_ACCOUNT_ID, CLOUDFLARE_API_TOKEN - API access (verify / automation)
#
# Tags: deploy, start, stop, restart, status, undeploy, route-dns
- name: workspace-ci Wiki Cloudflare Tunnel
  hosts: localhost
  gather_facts: true

  vars:
    project_root: '{{ playbook_dir | dirname | dirname }}'
    tunnel_unit: wiki-ci-tunnel.service
    systemd_dir: '{{ ansible_env.HOME }}/.config/systemd/user'
    cloudflared_bin_default: '{{ project_root }}/.boot-linux/bin/cloudflared'
    tunnel_config_default: '{{ project_root }}/cloudflare/config.yml'
    cloudflared_bin: "{{ lookup('env', 'CLOUDFLARED_BIN') | default(cloudflared_bin_default, true) }}"
    tunnel_config: "{{ lookup('env', 'TUNNEL_CONFIG') | default(tunnel_config_default, true) }}"
    wiki_tunnel_hostname: "{{ lookup('env', 'WIKI_TUNNEL_HOSTNAME') | default('', true) }}"
    wiki_tunnel_name: "{{ lookup('env', 'WIKI_TUNNEL_NAME') | default('workspace-ci-wiki', true) }}"
    wiki_https_port: "{{ lookup('env', 'WIKI_HTTPS_PORT') | default('443', true) }}"
    wiki_tunnel_origin: "{{ lookup('env', 'WIKI_TUNNEL_ORIGIN') | default('https://127.0.0.1:' + (lookup('env', 'WIKI_HTTPS_PORT') | default('443', true)), true) }}"
    tunnel_token: "{{ lookup('env', 'TUNNEL_TOKEN') | default('', true) }}"
    cloudflare_account_id: "{{ lookup('env', 'CLOUDFLARE_ACCOUNT_ID') | default('', true) }}"
    cloudflare_api_token: "{{ lookup('env', 'CLOUDFLARE_API_TOKEN') | default('', true) }}"

  tasks:
    - name: Resolve project root
      tags: [always]
      block:
        - name: Get absolute project path
          ansible.builtin.command: realpath {{ project_root }}
          register: resolved_root
          changed_when: false

        - name: Set resolved paths
          ansible.builtin.set_fact:
            project_root: '{{ resolved_root.stdout }}'
            cloudflared_bin_default: '{{ resolved_root.stdout }}/.boot-linux/bin/cloudflared'
            tunnel_config_default: '{{ resolved_root.stdout }}/cloudflare/config.yml'
            cloudflared_bin: "{{ lookup('env', 'CLOUDFLARED_BIN') | default(resolved_root.stdout + '/.boot-linux/bin/cloudflared', true) }}"
            tunnel_config: "{{ lookup('env', 'TUNNEL_CONFIG') | default(resolved_root.stdout + '/cloudflare/config.yml', true) }}"

    - name: Ensure systemd user directory exists
      tags: [always, start, deploy]
      ansible.builtin.file:
        path: '{{ systemd_dir }}'
        state: directory
        mode: '0755'

    - name: Validate cloudflared binary
      tags: [always, start, deploy, restart, route-dns]
      ansible.builtin.stat:
        path: '{{ cloudflared_bin }}'
      register: cloudflared_stat

    - name: Fail if cloudflared missing
      tags: [always, start, deploy, restart, route-dns]
      ansible.builtin.fail:
        msg: |
          cloudflared not found at {{ cloudflared_bin }}.
          Set CLOUDFLARED_BIN=/path/to/cloudflared
      when: not cloudflared_stat.stat.exists or not cloudflared_stat.stat.executable | default(false)

    - name: Deploy tunnel
      tags: [start, restart, deploy]
      block:
        - name: Check tunnel credentials
          ansible.builtin.stat:
            path: '{{ project_root }}/cloudflare/credentials.json'
          register: tunnel_creds

        - name: Check tunnel config
          ansible.builtin.stat:
            path: '{{ tunnel_config }}'
          register: tunnel_cfg

        - name: Fail if tunnel config missing (non-token mode)
          ansible.builtin.fail:
            msg: |
              Tunnel config not found at {{ tunnel_config }}.
              Copy cloudflare/config.yml.example to cloudflare/config.yml and edit.
              Or set TUNNEL_CONFIG=/path/to/config.yml
              Or set TUNNEL_TOKEN in .env for token-based run.
          when:
            - tunnel_token | length == 0
            - not tunnel_cfg.stat.exists

        - name: Fail if credentials missing (non-token mode)
          ansible.builtin.fail:
            msg: |
              cloudflare/credentials.json not found.
              Bootstrap:
                CLOUDFLARED_BIN={{ cloudflared_bin }} {{ cloudflared_bin }} tunnel login
                {{ cloudflared_bin }} tunnel create {{ wiki_tunnel_name }}
                cp ~/.cloudflared/<TUNNEL_ID>.json {{ project_root }}/cloudflare/credentials.json
              Or set TUNNEL_TOKEN in .env (from dashboard or: cloudflared tunnel token {{ wiki_tunnel_name }})
          when:
            - tunnel_token | length == 0
            - not tunnel_creds.stat.exists

        - name: Check wiki prod containers are running
          ansible.builtin.command:
            argv:
              - podman
              - ps
              - --filter
              - name=wiki-ci-
              - --format
              - '{{ "{{" }}.Names{{ "}}" }} {{ "{{" }}.Status{{ "}}" }}'
          register: wiki_containers
          changed_when: false

        - name: Show wiki prod container list
          ansible.builtin.debug:
            msg: '{{ wiki_containers.stdout | default("(none)") | trim }}'

        - name: Fail if wiki prod stack is not running
          ansible.builtin.fail:
            msg: |
              Wiki prod stack must be running before starting the tunnel.
              Expected containers: wiki-ci-app, wiki-ci-nginx
              Found: {{ wiki_containers.stdout | default('(none)') | trim }}
              Start prod first: make wiki-prod-start
          when: >
            'wiki-ci-app' not in (wiki_containers.stdout | default(''))
            or 'wiki-ci-nginx' not in (wiki_containers.stdout | default(''))

        - block:
            - name: Preflight wiki prod HTTPS locally (tunnel origin)
              ansible.builtin.uri:
                url: '{{ wiki_tunnel_origin }}/'
                validate_certs: false
                status_code: [200, 301, 302, 307, 308]
                timeout: 5
              register: wiki_local

          rescue:
            - name: Fail if wiki prod origin is not reachable
              ansible.builtin.fail:
                msg: |
                  Tunnel origin {{ wiki_tunnel_origin }}/ is not reachable.
                  The tunnel proxies wiki prod nginx on host :{{ wiki_https_port }}. Start prod first:
                    make wiki-prod-start
                  Detail: {{ ansible_failed_result.msg | default('no response') }}

        - name: Install tunnel systemd unit
          ansible.builtin.template:
            src: templates/wiki-ci-tunnel.service.j2
            dest: '{{ systemd_dir }}/{{ tunnel_unit }}'
            mode: '0644'

        - name: Enable systemd user linger
          tags: [deploy]
          ansible.builtin.command: loginctl enable-linger {{ ansible_user_id }}
          register: linger_result
          failed_when: linger_result.rc != 0
          changed_when: linger_result.rc == 0

        - name: Show linger enable result
          ansible.builtin.debug:
            msg: '{{ linger_result.stdout | default("") | trim }}'

        - name: Reload systemd user daemon
          ansible.builtin.systemd:
            daemon_reload: true
            scope: user

        - name: Enable and start tunnel
          ansible.builtin.systemd:
            name: '{{ tunnel_unit }}'
            enabled: true
            state: restarted
            scope: user

        - name: Tunnel started
          ansible.builtin.debug:
            msg: |
              Cloudflare tunnel running (origin = wiki prod {{ wiki_tunnel_origin }}).
                Binary : {{ cloudflared_bin }}
                Config : {{ tunnel_config }}
                Prod   : wiki-ci-app + wiki-ci-nginx on host :{{ wiki_https_port }}
                Logs   : journalctl --user -u {{ tunnel_unit }} -f
                Stop   : make wiki-tunnel-stop

    - name: Stop tunnel before restart
      tags: [restart]
      ansible.builtin.systemd:
        name: '{{ tunnel_unit }}'
        state: stopped
        scope: user
      register: restart_stop
      failed_when: >
        restart_stop.failed
        and 'Could not find the requested service' not in (restart_stop.msg | default(''))

    - name: Stop tunnel
      tags: [stop, undeploy]
      ansible.builtin.systemd:
        name: '{{ tunnel_unit }}'
        state: stopped
        scope: user
      register: stop_tunnel
      failed_when: >
        stop_tunnel.failed
        and 'Could not find the requested service' not in (stop_tunnel.msg | default(''))

    - name: Show tunnel status
      tags: [status, never]
      block:
        - name: Check tunnel service
          ansible.builtin.command: systemctl --user is-active {{ tunnel_unit }}
          register: tunnel_status
          failed_when: tunnel_status.rc not in [0, 3]
          changed_when: false

        - name: Check public hostname
          ansible.builtin.uri:
            url: 'https://{{ wiki_tunnel_hostname }}/'
            validate_certs: true
            status_code: [200, 301, 302, 307, 308]
            timeout: 5
          register: public_check
          when: wiki_tunnel_hostname | length > 0

        - name: Display status
          ansible.builtin.debug:
            msg: |
              Tunnel status:
                Unit   : {{ tunnel_status.stdout | default('not installed') }}
                Binary : {{ cloudflared_bin }}
                Config : {{ tunnel_config }}
                {% if wiki_tunnel_hostname | length > 0 %}
                Public : {{ 'UP' if (public_check.status | default(0) in [200, 301, 302, 307, 308]) else 'DOWN' }} (https://{{ wiki_tunnel_hostname }}/)
                {% else %}
                Public : set WIKI_TUNNEL_HOSTNAME for HTTP probe
                {% endif %}
                Logs   : journalctl --user -u {{ tunnel_unit }} -f

      rescue:
        - name: Display status with public hostname down
          ansible.builtin.debug:
            msg: |
              Tunnel status:
                Unit   : {{ tunnel_status.stdout | default('not installed') }}
                Binary : {{ cloudflared_bin }}
                Config : {{ tunnel_config }}
                {% if wiki_tunnel_hostname | length > 0 %}
                Public : DOWN (https://{{ wiki_tunnel_hostname }}/)
                {% else %}
                Public : set WIKI_TUNNEL_HOSTNAME for HTTP probe
                {% endif %}
                Logs   : journalctl --user -u {{ tunnel_unit }} -f

    - name: Route DNS for tunnel hostname
      tags: [route-dns, never]
      block:
        - name: Fail if hostname unset
          ansible.builtin.fail:
            msg: 'Set WIKI_TUNNEL_HOSTNAME before running route-dns'
          when: wiki_tunnel_hostname | length == 0

        - name: Route DNS
          ansible.builtin.command:
            argv:
              - '{{ cloudflared_bin }}'
              - tunnel
              - route
              - dns
              - '{{ wiki_tunnel_name }}'
              - '{{ wiki_tunnel_hostname }}'
          register: route_dns
          failed_when: route_dns.rc != 0
          changed_when: route_dns.rc == 0

        - name: Route DNS result
          ansible.builtin.debug:
            msg: '{{ route_dns.stdout | default("") | trim }}'

    - name: Undeploy tunnel
      tags: [undeploy, never]
      block:
        - name: Disable tunnel service
          ansible.builtin.systemd:
            name: '{{ tunnel_unit }}'
            enabled: false
            state: stopped
            scope: user
          register: undeploy_stop
          failed_when: >
            undeploy_stop.failed
            and 'Could not find the requested service' not in (undeploy_stop.msg | default(''))

        - name: Remove tunnel unit file
          ansible.builtin.file:
            path: '{{ systemd_dir }}/{{ tunnel_unit }}'
            state: absent

        - name: Reload systemd user daemon
          ansible.builtin.systemd:
            daemon_reload: true
            scope: user

        - name: Tunnel undeployed
          ansible.builtin.debug:
            msg: Cloudflare tunnel undeployed.