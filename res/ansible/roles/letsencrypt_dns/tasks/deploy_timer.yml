---
- name: Fail deploy without playbook path
  ansible.builtin.fail:
    msg: 'Set letsencrypt_playbook_path to the absolute path of letsencrypt.yml for timer deploy.'
  when: letsencrypt_playbook_path | length == 0

- name: Ensure systemd user directory exists
  ansible.builtin.file:
    path: '{{ ansible_env.HOME }}/.config/systemd/user'
    state: directory
    mode: '0755'

- name: Install renewal service unit
  ansible.builtin.template:
    src: letsencrypt-renew.service.j2
    dest: '{{ ansible_env.HOME }}/.config/systemd/user/{{ letsencrypt_unit_name }}.service'
    mode: '0644'

- name: Install renewal timer unit
  ansible.builtin.template:
    src: letsencrypt-renew.timer.j2
    dest: '{{ ansible_env.HOME }}/.config/systemd/user/{{ letsencrypt_unit_name }}.timer'
    mode: '0644'

- name: Enable systemd user linger for renewal timer
  ansible.builtin.command: loginctl enable-linger {{ ansible_user_id }}
  register: _linger
  changed_when: _linger.rc == 0
  failed_when: _linger.rc != 0

- name: Show linger enable result
  ansible.builtin.debug:
    msg: '{{ _linger.stdout | default("") | trim }}'

- name: Reload systemd user daemon
  ansible.builtin.systemd:
    daemon_reload: true
    scope: user

- name: Enable and start renewal timer
  ansible.builtin.systemd:
    name: '{{ letsencrypt_unit_name }}.timer'
    enabled: true
    state: started
    scope: user

- name: Renewal timer deployed
  ansible.builtin.debug:
    msg: |
      Let's Encrypt renewal timer enabled ({{ letsencrypt_unit_name }}.timer).
        Status : systemctl --user status {{ letsencrypt_unit_name }}.timer
        Logs   : journalctl --user -u {{ letsencrypt_unit_name }}.service