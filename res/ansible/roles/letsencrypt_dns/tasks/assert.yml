---
- name: Assert required Let's Encrypt variables
  ansible.builtin.assert:
    that:
      - letsencrypt_domains | length > 0
      - letsencrypt_email | length > 0
      - letsencrypt_cloudflare_api_token | length > 0
      - letsencrypt_cloudflare_zone | length > 0
      - letsencrypt_cert_dir | length > 0
    fail_msg: |
      Required: letsencrypt_domains, letsencrypt_email, letsencrypt_cert_dir,
      letsencrypt_cloudflare_zone, and CLOUDFLARE_API_TOKEN (Zone:DNS:Edit).

- name: Resolve Cloudflare zone id
  ansible.builtin.uri:
    url: 'https://api.cloudflare.com/client/v4/zones?name={{ letsencrypt_cloudflare_zone }}'
    method: GET
    headers:
      Authorization: 'Bearer {{ letsencrypt_cloudflare_api_token }}'
    status_code: 200
  register: _cf_zone_lookup
  no_log: true

- name: Fail if Cloudflare zone is missing or token lacks DNS access
  ansible.builtin.fail:
    msg: |
      Cloudflare zone '{{ letsencrypt_cloudflare_zone }}' not found or token lacks Zone:DNS:Edit.
      Set letsencrypt_cloudflare_zone to the apex zone containing {{ letsencrypt_domains | join(", ") }}.
      Note: account-scoped API tokens may fail /user/tokens/verify but still work here.
  when: >
    (_cf_zone_lookup.json.success | default(false) | bool == false)
    or (_cf_zone_lookup.json.result | default([]) | length == 0)